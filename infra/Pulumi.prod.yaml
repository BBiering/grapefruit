config:
  # Intentionally config-free. Do NOT commit project IDs or secrets here.
  #
  # The "Set config from GitHub secrets" step in
  # .github/workflows/pulumi-up.yml runs `pulumi config set` for all six
  # values (gcp:project, gcp:region, image_uri, and the three secrets) from
  # GitHub repo secrets at runtime. Secrets are encrypted at rest in the GCS
  # state with PULUMI_CONFIG_PASSPHRASE. See infra/README.md.
