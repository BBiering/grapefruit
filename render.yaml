services:
  - type: web
    name: grapefruit-api
    runtime: python
    plan: free
    pythonVersion: "3.12"
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn grapefruit.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: EODHD_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
