name: Deploy Cloud Run Jobs

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".github/workflows/deploy-jobs.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: grapefruit-pipelines
  JOBS: >-
    refresh_universe refresh_bars refresh_fundamentals
    detect_winners enrich_catalysts refresh_watchlist
    refresh_upcoming_events weekly

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${IMAGE_NAME}:${GITHUB_SHA}"
          IMAGE_LATEST="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${IMAGE_NAME}:latest"
          docker build -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update Cloud Run Jobs
        run: |
          for job in ${JOBS}; do
            # Cloud Run job names are hyphenated (the arg keeps underscores);
            # see infra/__main__.py.
            name="grapefruit-${job//_/-}"
            echo "::group::${name}"
            gcloud run jobs update "${name}" \
              --image="${IMAGE}" \
              --region="${{ secrets.GCP_REGION }}" \
              --quiet
            echo "::endgroup::"
          done
