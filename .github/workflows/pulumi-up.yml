name: Pulumi up (GCP infra)

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/pulumi-up.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "preview or up"
        required: true
        default: "preview"
        type: choice
        options: [preview, up]

permissions:
  contents: read
  id-token: write

jobs:
  pulumi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pulumi's Python runtime auto-discovers the project's package manager.
      # The repo root pyproject.toml uses uv as the build backend, so Pulumi
      # tries to invoke uv during preview/up. Install it on PATH first.
      - uses: astral-sh/setup-uv@v3

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      # Pulumi.yaml declares runtime.options.virtualenv: venv, so Pulumi runs
      # the program with infra/venv/bin/python. Create that venv and install
      # the deps into it (NOT system Python), or Pulumi launches an interpreter
      # without the `pulumi` module ("No module named 'pulumi'").
      - name: Create venv and install deps
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Pulumi login (self-managed GCS state)
        run: pulumi login "gs://${{ secrets.PULUMI_STATE_BUCKET }}"

      - name: Select stack
        run: pulumi stack select prod || pulumi stack init prod

      # Set every config value from GitHub secrets at runtime, so the operator
      # never has to run `pulumi config set` locally. Plain values + secrets are
      # written to the stack's state on each run; harmless if unchanged.
      # image_uri is derived from the same secrets deploy-jobs.yml uses.
      - name: Set Pulumi config from GitHub secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          : "${GCP_PROJECT_ID:?GCP_PROJECT_ID secret is required}"
          : "${GCP_REGION:?GCP_REGION secret is required}"
          : "${GCP_ARTIFACT_REPO:?GCP_ARTIFACT_REPO secret is required}"
          : "${EODHD_API_KEY:?EODHD_API_KEY secret is required}"
          : "${DATABASE_URL:?DATABASE_URL secret is required}"
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPO}/grapefruit-pipelines:latest"
          pulumi config set gcp:project "$GCP_PROJECT_ID"
          pulumi config set gcp:region  "$GCP_REGION"
          pulumi config set image_uri   "$IMAGE_URI"
          pulumi config set --secret eodhd_api_key      "$EODHD_API_KEY"
          pulumi config set --secret perplexity_api_key "${PERPLEXITY_API_KEY:-}"
          pulumi config set --secret database_url       "$DATABASE_URL"

      - name: Preview
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'preview')
        run: pulumi preview --diff

      - name: Up
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'up')
        run: pulumi up --yes --skip-preview --refresh
